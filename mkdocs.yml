site_name: 灵巧手知识库
site_description: 灵巧手（Dexterous Hand）硬件设计、控制算法与系统集成知识库
site_url: https://xymsh.github.io/dexhand-knowledge-base/
repo_url: https://github.com/xymsh/dexhand-knowledge-base
repo_name: dexhand-knowledge-base

# 内容占位/待补充的笔记：仍会被构建（直接链接可访问），但不出现在导航栏里
not_in_nav: |
  02-控制与算法/README.md
  03-系统集成/README.md
  04-厂商与产品方案/README.md
  01-硬件设计/驱动-减速-传动/探索中/*

# 已被新版技术路线分类取代的旧文档：保留在仓库里存档，不参与网站构建
exclude_docs: |
  01-硬件设计/驱动-减速-传动/_archive-旧版技术路线分类/*

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang:
        - en
        - zh
  - awesome-pages

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - meta
